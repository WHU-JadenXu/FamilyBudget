<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef6f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="家庭记账" />
    <title>家庭记账</title>
    <link rel="apple-touch-icon" href="./assets/miniapp-avatar-xl.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-band">
        <div>
          <p class="eyebrow">👦 李逍宇 & 👧 徐佳丹</p>
          <h1>家庭记账</h1>
        </div>
        <div class="month-chip" id="monthLabel"></div>
      </section>

      <section class="summary-band" aria-label="本月概览">
        <div class="summary-main">
          <span>本月支出</span>
          <strong id="monthExpense">¥0.00</strong>
        </div>
        <div class="summary-grid">
          <div>
            <span>👦 李逍宇</span>
            <strong id="liTotal">¥0.00</strong>
          </div>
          <div>
            <span>👧 徐佳丹</span>
            <strong id="xuTotal">¥0.00</strong>
          </div>
          <div>
            <span>本月收入</span>
            <strong id="monthIncome">¥0.00</strong>
          </div>
        </div>
      </section>

      <section id="pageEntry" class="app-page active" data-page="entry">
        <section class="cloud-panel" aria-label="云同步">
          <div>
            <strong id="cloudStatus">本地模式</strong>
            <span id="cloudHint">填好 Supabase 配置并登录后，会自动同步到云端。</span>
          </div>
          <form id="loginForm" class="login-form">
            <input id="emailInput" type="email" autocomplete="email" placeholder="邮箱" required />
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码" required />
            <button id="loginBtn" type="submit">登录同步</button>
          </form>
          <div class="cloud-actions">
            <button id="syncBtn" type="button">同步</button>
            <button id="logoutBtn" type="button" hidden>退出</button>
          </div>
        </section>

        <section class="entry-panel" aria-label="新增记账">
          <div class="segmented" role="group" aria-label="记账类型">
            <button class="segment active" data-type="expense" type="button">支出</button>
            <button class="segment" data-type="income" type="button">收入</button>
          </div>

          <form id="entryForm" class="entry-form">
            <label>
              <span>记账人</span>
              <select id="person" name="person">
                <option value="李逍宇">👦 李逍宇</option>
                <option value="徐佳丹">👧 徐佳丹</option>
              </select>
            </label>

            <label>
              <span>金额</span>
              <input id="amount" name="amount" inputmode="decimal" autocomplete="off" placeholder="0.00" required />
            </label>

            <label class="full">
              <span>日期</span>
              <input id="entryDate" name="entryDate" type="date" required />
            </label>

            <label id="benefitField" class="full">
              <span>花给谁</span>
              <select id="benefit" name="benefit">
                <option value="李逍宇用">👦 李逍宇用</option>
                <option value="徐佳丹用">👧 徐佳丹用</option>
                <option value="两个人共用">👫 两个人共用</option>
              </select>
            </label>

            <label>
              <span>大类</span>
              <select id="majorCategory" name="majorCategory"></select>
            </label>

            <label>
              <span>小类</span>
              <select id="minorCategory" name="minorCategory"></select>
            </label>

            <label class="full">
              <span>备注</span>
              <input id="note" name="note" autocomplete="off" placeholder="可不填" />
            </label>

            <div class="form-actions full">
              <button id="submitEntryBtn" class="primary-action" type="submit">记一笔</button>
              <button id="cancelEditBtn" class="secondary-action" type="button" hidden>取消编辑</button>
            </div>
          </form>
        </section>

        <section class="records-section">
          <div class="section-heading">
            <h2>最新 5 条</h2>
          </div>
          <div id="recentRecordsList" class="records-list"></div>
        </section>
      </section>

      <section id="pageRecords" class="app-page" data-page="records">
        <section class="records-section">
          <div class="section-heading">
            <h2>全部记录</h2>
            <select id="filterPerson" aria-label="筛选记账人">
              <option value="all">全部</option>
              <option value="李逍宇">👦 李逍宇</option>
              <option value="徐佳丹">👧 徐佳丹</option>
            </select>
          </div>
          <input id="searchInput" class="record-search" type="search" autocomplete="off" placeholder="搜索分类、备注、日期、金额" />
          <div id="allRecordsList" class="records-list"></div>
        </section>
      </section>

      <section id="pageExport" class="app-page" data-page="export">
        <section class="toolbar" aria-label="数据工具">
          <div class="date-range-picker">
            <span>导出时间段</span>
            <button id="dateRangeBtn" class="date-range-button" type="button">
              <strong id="dateRangeText"></strong>
              <span>选择日期</span>
            </button>
            <input id="exportStartDate" type="hidden" />
            <input id="exportEndDate" type="hidden" />
            <div id="calendarPanel" class="calendar-panel" hidden>
              <div class="calendar-head">
                <button id="calendarPrevBtn" type="button" aria-label="上个月">‹</button>
                <strong id="calendarMonthLabel"></strong>
                <button id="calendarNextBtn" type="button" aria-label="下个月">›</button>
              </div>
              <div class="calendar-weekdays">
                <span>一</span>
                <span>二</span>
                <span>三</span>
                <span>四</span>
                <span>五</span>
                <span>六</span>
                <span>日</span>
              </div>
              <div id="calendarGrid" class="calendar-grid"></div>
            </div>
          </div>
          <button id="exportExcelBtn" class="wide-action" type="button">导出 Excel</button>
          <div class="json-actions">
            <button id="exportBtn" type="button">导出 JSON</button>
            <label class="import-button">
              导入 JSON
              <input id="importFile" type="file" accept="application/json" />
            </label>
          </div>
          <button id="clearBtn" class="danger-action" type="button">清空全部记录</button>
        </section>
      </section>

      <nav class="bottom-tabs" aria-label="页面切换">
        <button class="bottom-tab active" data-target-page="entry" type="button">记录</button>
        <button class="bottom-tab" data-target-page="records" type="button">明细</button>
        <button class="bottom-tab" data-target-page="export" type="button">导出</button>
      </nav>
    </main>

    <template id="recordTemplate">
      <article class="record-item">
        <div class="record-icon"></div>
        <div class="record-copy">
          <strong class="record-title"></strong>
          <span class="record-meta"></span>
        </div>
        <div class="record-money"></div>
        <div class="record-actions">
          <button class="record-edit" type="button">编辑</button>
          <button class="record-delete" type="button">删除</button>
        </div>
      </article>
    </template>

    <script src="./config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
